<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZeroSoils · User Profile</title>
  <meta name="theme-color" content="#06090f" />
  <meta property="og:site_name" content="ZeroSoils" />
  <link rel="icon" href="/favicon/favicon.ico" />

  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Tokens ── */
    :root {
      --space:       #06090f;
      --space-2:     #0a0f1e;
      --glass:       rgba(255,255,255,0.055);
      --glass-b:     rgba(255,255,255,0.09);
      --text:        #e8eaf0;
      --text-dim:    #8892a4;
      --text-muted:  #4a5568;
      --saffron:     #FF9933;
      --blue:        #4da6ff;
      --live:        #00ff88;
      --mono: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
      --sans: "Inter", system-ui, sans-serif;
      --accent: var(--blue);
    }

    /* ── Base ── */
    html, body {
      min-height: 100%;
      background: var(--space);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    body {
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(77,166,255,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(255,153,51,0.05) 0%, transparent 50%),
        var(--space);
      min-height: 100vh;
    }

    /* ── Stars ── */
    .stars {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 42% 8%,  rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 35%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 15%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 75%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 55%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 8%  85%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 90%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 35% 45%, rgba(255,255,255,0.25) 0%, transparent 100%);
    }

    /* ── Layout ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 60px;
    }

    /* ── Top bar ── */
    .topbar {
      width: 100%; max-width: 680px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 40px;
    }
    .topbar-brand {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none; color: var(--text-dim);
      font-size: 0.78rem; font-family: var(--mono); letter-spacing: 0.06em;
    }
    .topbar-brand .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.85); }
    }
    .topbar-universe {
      font-size: 0.72rem; font-family: var(--mono); letter-spacing: 0.05em;
      color: var(--text-muted);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px; padding: 5px 12px;
      text-decoration: none;
      transition: color 0.15s, border-color 0.15s;
    }
    .topbar-universe:hover { color: var(--accent); border-color: var(--accent); }

    /* ── Card ── */
    .card {
      width: 100%; max-width: 520px;
      background: var(--glass);
      border: 1px solid var(--glass-b);
      border-radius: 20px;
      padding: 32px;
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    /* ── First user banner ── */
    .first-user-banner {
      display: flex; align-items: center; gap: 8px;
      background: linear-gradient(90deg, rgba(255,153,51,0.12), rgba(255,153,51,0.04));
      border: 1px solid rgba(255,153,51,0.25);
      border-radius: 8px;
      padding: 8px 14px;
      margin-bottom: 24px;
      font-size: 0.7rem; font-family: var(--mono); letter-spacing: 0.07em;
      color: var(--saffron);
    }
    .first-user-banner .star { font-size: 0.85rem; }

    /* ── Avatar row ── */
    .avatar-row {
      display: flex; align-items: flex-start; gap: 20px;
      margin-bottom: 20px;
    }
    .avatar-wrap { position: relative; flex-shrink: 0; }
    .avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.9rem; font-weight: 700; font-family: var(--sans);
      color: #fff;
      border: 2px solid var(--accent);
      box-shadow: 0 0 20px color-mix(in srgb, var(--accent) 30%, transparent);
      transition: box-shadow 0.3s;
    }
    .avatar:hover { box-shadow: 0 0 32px color-mix(in srgb, var(--accent) 50%, transparent); }
    .flag-badge {
      position: absolute; bottom: -2px; right: -4px;
      font-size: 1.1rem; line-height: 1;
    }
    .identity { flex: 1; min-width: 0; }
    .display-name {
      font-size: 1.4rem; font-weight: 700; line-height: 1.2;
      color: var(--text); margin-bottom: 2px;
    }
    .full-name {
      font-size: 0.82rem; color: var(--text-dim); margin-bottom: 6px;
    }
    .handle {
      font-family: var(--mono); font-size: 0.75rem;
      color: var(--accent); background: rgba(77,166,255,0.1);
      border: 1px solid rgba(77,166,255,0.2);
      border-radius: 4px; padding: 2px 7px;
      display: inline-block;
    }

    /* ── Verified badges ── */
    .badges {
      display: flex; gap: 6px; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .badge {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.67rem; font-family: var(--mono); letter-spacing: 0.04em;
      padding: 4px 9px; border-radius: 20px;
      border: 1px solid rgba(0,255,136,0.25);
      background: rgba(0,255,136,0.08);
      color: var(--live);
    }
    .badge-dot {
      width: 5px; height: 5px; border-radius: 50%; background: currentColor;
    }

    /* ── Trust bar ── */
    .section { margin-bottom: 18px; }
    .section-label {
      font-size: 0.64rem; font-family: var(--mono); letter-spacing: 0.1em;
      color: var(--text-muted); text-transform: uppercase; margin-bottom: 7px;
    }
    .trust-row { display: flex; align-items: center; gap: 6px; }
    .trust-seg {
      flex: 1; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.08);
      transition: background 0.3s;
    }
    .trust-seg.active { background: var(--accent); }
    .trust-label {
      font-size: 0.7rem; font-family: var(--mono); color: var(--accent);
      white-space: nowrap;
    }
    .hdi-code {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.68rem; font-family: var(--mono); color: var(--text-muted);
      margin-top: 6px;
    }
    .shield { opacity: 0.5; }

    /* ── Bio ── */
    .bio {
      font-size: 0.82rem; color: var(--text-dim); line-height: 1.6;
      border-left: 2px solid var(--glass-b);
      padding-left: 12px;
      margin-bottom: 18px;
    }

    /* ── Location ── */
    .location-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.8rem; color: var(--text-dim);
    }
    .location-icon { opacity: 0.5; font-size: 0.75rem; }

    /* ── Assets ── */
    .asset-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .asset-item {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px; padding: 8px 12px;
      font-size: 0.78rem; color: var(--text-dim);
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }
    .asset-item:hover { background: rgba(255,255,255,0.06); border-color: var(--glass-b); }
    .asset-icon { font-size: 0.9rem; opacity: 0.7; }
    .asset-label { flex: 1; }
    .asset-type {
      font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.06em;
      color: var(--text-muted); text-transform: uppercase;
    }
    .asset-ext { font-size: 0.7rem; opacity: 0.4; margin-left: auto; }

    /* ── Links ── */
    .links-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .link-pill {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.74rem; font-family: var(--mono);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px; padding: 6px 14px;
      color: var(--text-dim); text-decoration: none;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .link-pill:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 8%, transparent);
    }

    /* ── Divider ── */
    .divider {
      height: 1px; background: rgba(255,255,255,0.06);
      margin: 18px 0;
    }

    /* ── CTA footer ── */
    .card-footer {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-top: 22px;
    }
    .btn-verify {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.74rem; font-family: var(--mono); letter-spacing: 0.04em;
      border: 1px solid rgba(0,255,136,0.3);
      background: rgba(0,255,136,0.06);
      color: var(--live);
      border-radius: 8px; padding: 9px 16px;
      cursor: pointer; text-decoration: none;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-verify:hover { background: rgba(0,255,136,0.12); transform: translateY(-1px); }
    .btn-universe {
      display: flex; align-items: center; gap: 6px; flex: 1;
      font-size: 0.74rem; font-family: var(--mono); letter-spacing: 0.04em;
      border: 1px solid rgba(77,166,255,0.3);
      background: rgba(77,166,255,0.08);
      color: var(--blue);
      border-radius: 8px; padding: 9px 16px;
      cursor: pointer; text-decoration: none; justify-content: center;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-universe:hover { background: rgba(77,166,255,0.15); transform: translateY(-1px); }

    /* ── Bottom badge ── */
    .bottom-badge {
      margin-top: 28px;
      display: flex; align-items: center; gap: 8px;
      font-size: 0.67rem; font-family: var(--mono); letter-spacing: 0.06em;
      color: var(--text-muted);
    }
    .bottom-badge a { color: inherit; text-decoration: none; }
    .bottom-badge a:hover { color: var(--accent); }
    .bottom-sep { color: rgba(255,255,255,0.15); }

    /* ── Loading / error states ── */
    .state-center {
      display: flex; flex-direction: column; align-items: center;
      gap: 12px; padding: 60px 0;
      font-family: var(--mono); font-size: 0.8rem; color: var(--text-muted);
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid rgba(255,255,255,0.08);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 560px) {
      .card { padding: 22px 18px; }
      .avatar { width: 60px; height: 60px; font-size: 1.5rem; }
      .display-name { font-size: 1.2rem; }
    }

    /* ── Hidden ── */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="stars"></div>

  <div class="page">
    <!-- Top bar -->
    <nav class="topbar">
      <a href="/" class="topbar-brand">
        <span class="dot" id="accentDot"></span>
        ZEROSOILS · HDI
      </a>
      <a href="https://zerosoils.com" target="_blank" rel="noopener" class="topbar-universe">
        ⊕ Enter Universe
      </a>
    </nav>

    <!-- Loading state -->
    <div id="stateLoading" class="state-center card" style="max-width:520px;width:100%">
      <div class="spinner"></div>
      <span>Fetching identity…</span>
    </div>

    <!-- Error state -->
    <div id="stateError" class="state-center card hidden" style="max-width:520px;width:100%">
      <span style="font-size:1.6rem">⚠</span>
      <span id="errorMsg">User not found</span>
      <a href="/" style="color:var(--blue);font-size:0.72rem">← ZeroSoils Home</a>
    </div>

    <!-- Profile card -->
    <div id="profileCard" class="card hidden">

      <!-- First-user banner (shown only for is_first_user) -->
      <div id="firstUserBanner" class="first-user-banner hidden">
        <span class="star">★</span>
        FIRST USER ON THE INTERNET · NODE #1
      </div>

      <!-- Avatar + identity -->
      <div class="avatar-row">
        <div class="avatar-wrap">
          <div class="avatar" id="avatar"></div>
          <span class="flag-badge" id="flagBadge"></span>
        </div>
        <div class="identity">
          <div class="display-name" id="displayName"></div>
          <div class="full-name" id="fullName"></div>
          <code class="handle" id="handle"></code>
        </div>
      </div>

      <!-- Verified badges -->
      <div class="badges" id="badges"></div>

      <!-- Bio -->
      <p class="bio hidden" id="bio"></p>

      <!-- Trust -->
      <div class="section">
        <div class="section-label">Trust Level</div>
        <div class="trust-row">
          <div class="trust-seg" id="ts0"></div>
          <div class="trust-seg" id="ts1"></div>
          <div class="trust-seg" id="ts2"></div>
          <div class="trust-seg" id="ts3"></div>
          <span class="trust-label" id="trustLabel"></span>
        </div>
        <div class="hdi-code">
          <span class="shield">🛡</span>
          <span id="hdiCode"></span>
        </div>
      </div>

      <!-- Location -->
      <div class="section hidden" id="locationSection">
        <div class="section-label">Location</div>
        <div class="location-row">
          <span class="location-icon">📍</span>
          <span id="locationText"></span>
        </div>
      </div>

      <!-- Assets -->
      <div class="section hidden" id="assetsSection">
        <div class="section-label">Assets · <span id="assetCount">0</span></div>
        <ul class="asset-list" id="assetList"></ul>
      </div>

      <div class="divider"></div>

      <!-- Quick links -->
      <div class="section hidden" id="linksSection">
        <div class="section-label">Links</div>
        <div class="links-row" id="linksRow"></div>
      </div>

      <!-- CTA -->
      <div class="card-footer">
        <a id="verifyBtn" href="#" target="_blank" rel="noopener" class="btn-verify">
          🛡 Verify Identity
        </a>
        <a id="universeBtn" href="https://zerosoils.com" target="_blank" rel="noopener" class="btn-universe">
          ⊕ View in Universe
        </a>
      </div>
    </div>

    <!-- Bottom badge -->
    <div class="bottom-badge">
      <span>Powered by</span>
      <a href="https://zerosoils.com">ZeroSoils</a>
      <span class="bottom-sep">·</span>
      <span id="licenseTag">HID-SOVEREIGN-1.0</span>
      <span class="bottom-sep">·</span>
      <a href="https://zerosoils.com">Open Network</a>
    </div>
  </div>

  <script>
    const TRUST_LABELS = ['Unverified', 'Self-Sovereign', 'Public Verified', 'Chain Stamped'];
    const ASSET_ICONS  = { domain: '🔗', org: '🏛', blockchain: '⛓', business: '💼', default: '📦' };

    function show(id)  { document.getElementById(id).classList.remove('hidden'); }
    function hide(id)  { document.getElementById(id).classList.add('hidden'); }
    function el(id)    { return document.getElementById(id); }
    function setText(id, v) { el(id).textContent = v; }

    function getHandle() {
      // URL patterns: /@handle, /u/@handle, /u/handle, /u?handle=@x
      const params = new URLSearchParams(window.location.search);
      if (params.get('handle')) return params.get('handle');

      const path  = window.location.pathname; // e.g. /@kingofyadav or /u/@kingofyadav
      const match = path.match(/\/@?([a-zA-Z0-9_.-]+)$/);
      return match ? match[1] : null;
    }

    function setAccent(color) {
      document.documentElement.style.setProperty('--accent', color);
      el('accentDot').style.background    = color;
      el('accentDot').style.boxShadow     = `0 0 8px ${color}`;
      el('avatar').style.borderColor      = color;
      el('avatar').style.boxShadow        = `0 0 20px ${color}40`;
    }

    function renderProfile(data) {
      // Accent color
      setAccent(data.avatar_color || '#4da6ff');

      // First user banner
      if (data.is_first_user) { show('firstUserBanner'); }

      // Update page title + OG
      document.title = `${data.display_name} (${data.handle}) · ZeroSoils`;

      // Avatar
      el('avatar').textContent = (data.display_name || data.handle)[0].toUpperCase();
      el('avatar').style.background = `linear-gradient(135deg, ${data.avatar_color}33, ${data.avatar_color}11)`;

      // Flag
      if (data.flag) setText('flagBadge', data.flag);

      // Identity
      setText('displayName', data.display_name || data.handle);
      setText('fullName', data.full_name || '');
      setText('handle', data.handle);

      // Badges
      const badgesEl = el('badges');
      if (data.email_verified) {
        badgesEl.insertAdjacentHTML('beforeend',
          `<div class="badge"><span class="badge-dot"></span>Email Verified</div>`);
      }
      if (data.phone_verified) {
        badgesEl.insertAdjacentHTML('beforeend',
          `<div class="badge"><span class="badge-dot"></span>Phone Verified</div>`);
      }
      if (data.trust_level >= 2) {
        badgesEl.insertAdjacentHTML('beforeend',
          `<div class="badge"><span class="badge-dot"></span>Public Verified</div>`);
      }

      // Bio
      if (data.bio) {
        show('bio');
        setText('bio', data.bio);
      }

      // Trust bar
      const level = data.trust_level ?? 0;
      for (let i = 0; i <= level; i++) el(`ts${i}`)?.classList.add('active');
      setText('trustLabel', TRUST_LABELS[level] || TRUST_LABELS[0]);
      setText('hdiCode', data.hdi_code || '—');

      // Location
      if (data.city || data.country) {
        show('locationSection');
        setText('locationText', [data.city, data.country].filter(Boolean).join(', '));
      }

      // Assets
      if (data.assets?.length) {
        show('assetsSection');
        setText('assetCount', data.assets.length);
        const list = el('assetList');
        data.assets.forEach(a => {
          const icon = ASSET_ICONS[a.type] || ASSET_ICONS.default;
          const tag  = a.url
            ? `<a href="${a.url}" target="_blank" rel="noopener" class="asset-item">`
            : `<li class="asset-item">`;
          const end  = a.url ? '</a>' : '</li>';
          list.insertAdjacentHTML('beforeend',
            `${tag}
              <span class="asset-icon">${icon}</span>
              <span class="asset-label">${a.label}</span>
              <span class="asset-type">${a.type}</span>
              ${a.url ? '<span class="asset-ext">↗</span>' : ''}
            ${end}`);
        });
      }

      // Links
      if (data.links?.length) {
        show('linksSection');
        const row = el('linksRow');
        data.links.forEach(l => {
          row.insertAdjacentHTML('beforeend',
            `<a href="${l.href}" target="_blank" rel="noopener" class="link-pill">
              ${l.label} <span>↗</span>
            </a>`);
        });
      }

      // CTAs
      el('verifyBtn').href  = data.verify_url  || '#';
      el('universeBtn').href = data.universe_url || 'https://zerosoils.com';

      // Show card
      hide('stateLoading');
      show('profileCard');
    }

    function showError(msg) {
      hide('stateLoading');
      show('stateError');
      setText('errorMsg', msg || 'User not found');
    }

    async function init() {
      const rawHandle = getHandle();
      if (!rawHandle) { showError('No handle in URL. Try /@username'); return; }

      const handle = rawHandle.startsWith('@') ? rawHandle : `@${rawHandle}`;

      try {
        const res = await fetch(`/api/user?handle=${encodeURIComponent(handle)}`);
        const json = await res.json();
        if (!json.ok || !json.data) {
          showError(json.error || 'User not found');
          return;
        }
        renderProfile(json.data);
      } catch {
        showError('Network error — please try again');
      }
    }

    init();
  </script>
</body>
</html>
